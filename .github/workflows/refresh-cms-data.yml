name: Refresh CMS auto-fill data

on:
  workflow_dispatch: {}
  schedule:
    - cron: "17 9 1 * *" # 09:17 UTC on the 1st of every month

permissions:
  contents: write
  actions: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/fetch-cms-data.mjs
      - name: Commit refreshed data if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/cms_autofill.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Refresh CMS Care Compare auto-fill data"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      # A push made with the default GITHUB_TOKEN does NOT trigger other
      # on:push workflows (GitHub's anti-recursion protection) — deploy.yml
      # would otherwise silently never redeploy the site with fresh data.
      # workflow_dispatch is a distinct, deliberate action and isn't subject
      # to that restriction, so trigger the deploy explicitly instead.
      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}
