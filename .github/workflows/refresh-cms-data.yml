name: Refresh CMS auto-fill data

on:
  workflow_dispatch: {}
  schedule:
    - cron: "17 9 * * 1" # every Monday 09:17 UTC

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/fetch-cms-data.mjs
      - name: Commit refreshed data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/cms_autofill.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Refresh CMS Care Compare auto-fill data"
            git push
          fi
